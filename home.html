<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind+daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <title>Homepage | Issue Tracker</title>
</head>

<body>
    <header>
        <!-- navbar -->
        <div
            class="navbar flex flex-col lg:flex-row items-center justify-between bg-white border-b border-b-[#E9E9E9] px-4 lg:px-18 py-4 lg:py-2">
            <div class="flex-1 items-center">
                <a class="flex items-center gap-2 text-xl font-semibold"> <img class="h-9 w-9"
                        src="assets/github-logo.png" alt="">
                    <span>GitHub Issues Tracker</span>
                </a>
            </div>

            <!-- search -->
            <div class="flex flex-col sm:flex-row lg:items-center gap-1 lg:gap-4 mt-6 lg:mt-0">
                <input id="search" type="search" placeholder="Search issues..." class="input input-bordered w-75" />
                <button class="btn text-white text-[1rem] font-semibold bg-[#4A00FF] border-none py-3.5 px-4 rounded">+
                    New
                    Issue</button>
            </div>
        </div>
    </header>

    

    <!-- JavaScript -->
    <script src="./script/home.js"></script>
</body>

</html>
