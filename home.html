<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind+daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <title>Homepage | Issue Tracker</title>
</head>

<body>
    <header>
        <!-- navbar -->
        <div
            class="navbar flex flex-col lg:flex-row items-center justify-between bg-white border-b border-b-[#E9E9E9] px-4 lg:px-18 py-4 lg:py-2">
            <div class="flex-1 items-center">
                <a class="flex items-center gap-2 text-xl font-semibold"> <img class="h-9 w-9"
                        src="assets/github-logo.png" alt="">
                    <span>GitHub Issues Tracker</span>
                </a>
            </div>

            <!-- search -->
            <div class="flex flex-col sm:flex-row lg:items-center gap-1 lg:gap-4 mt-6 lg:mt-0">
                <input id="search" type="search" placeholder="Search issues..." class="input input-bordered w-75" />
                <button class="btn text-white text-[1rem] font-semibold bg-[#4A00FF] border-none py-3.5 px-4 rounded">+
                    New
                    Issue</button>
            </div>
        </div>
    </header>
    <main class="bg-[#F8FAFC] min-h-screen px-4 lg:px-0 py-15">
        <section class="mx-auto">
            <!-- 3 buttons of 3 tabs -->
            <div
                class=" max-w-277.5 flex flex-col lg:flex-row gap-2 items-center bg-white rounded-lg shadow-[0_1px_6px_rgba(0,0,0,0.08)] p-6 mx-auto mb-4">
                <button onclick="allIssues()" id="allBtn"
                    class="btn w-30 h-10 text-[1rem] font-semibold text-white bg-[#4A00FF] rounded border border-[#E4E4E7] cursor-pointer">All</button>
                <button onclick="showOpen()" id="openBtn" class=" btn w-30 h-10 text-[1rem] font-semibold text-[#64748B] bg-white rounded border
                    border-[#E4E4E7] cursor-pointer">Open</button>
                <button onclick="showClosed()" id="closedBtn" class=" btn w-30 h-10 text-[1rem] font-semibold text-[#64748B] bg-white border border-[#E4E4E7]
                    rounded cursor-pointer">Closed</button>
            </div>

            <!-- issue count -->
            <div class="max-w-277.5 mx-auto rounded-lg shadow-[0_1px_6px_rgba(0,0,0,0.08)]">
                <div class="flex justify-between items-center bg-white rounded-t-lg p-6">
                    <div class="flex items-center gap-2">
                        <div class="bg-[#ECE4FF] p-2.25 rounded-full">
                            <img src="assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h3 class="text-[#1F2937] text-[1.25rem] font-semibold"><span id="issueCount">50</span>
                                Issues</h3>
                            <p class="text-[#64748B] text-[1rem]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex flex-col lg:flex-row gap-4">
                        <div class="flex gap-2 items-center">
                            <i class="fa-solid fa-circle text-[#00A96E]"></i>
                            <span class="text-[#1F2937] text-[1rem] font-semibold leading-none">Open</span>
                        </div>
                        <div class="flex gap-2 items-center">
                            <i class="fa-solid fa-circle text-[#A855F7]"></i>
                            <span class="text-[#1F2937] text-[1rem] font-semibold leading-none">Closed</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- spinner -->
            <section id="spinner" class="flex justify-center items-center py-10 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </section>
    </main>


    <!-- JavaScript -->
    <script src="./script/home.js"></script>
</body>

</html>
