<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- tailwind+daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <title>Login | Issues Tracker</title>
</head>

<body class="bg-[#F8FAFC] min-h-screen py-10 lg:py-20">

    <section class="px-5 lg:px-0">
        <form class="fieldset bg-white rounded-lg max-w-130 p-6 shadow-[0_5px_10px_rgba(0,0,0,0.08)]  mx-auto">
            <div class="text-center my-4 mx-auto">
                <img class="mx-auto mb-4" src="assets/github-logo.png" alt="">
                <h2 class="text-[#1F2937] text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] text-[1rem] mt-0.5">Sign in to manage your issues</p>
            </div>

            <label class="label text-[#1F2937] text-[1rem] font-medium">Username</label>
            <input id="username" type="text" class="input w-full text-[#000000] text-[1rem]"
                placeholder="Enter Username" />
            <p class="text-[0.875rem] text-[#4A00FF]">Default: admin</p>

            <label class="label text-[#1F2937] text-[1rem] font-medium mt-2">Password</label>
            <input id="password" type="password" class="input w-full text-[#000000] text-[1rem]"
                placeholder="Enter Password" />
            <p class="text-[0.875rem] text-[#4A00FF]">Default: admin123</p>


            <button id="signInBtn" class="btn bg-[#4A00FF] rounded-lg text-white text-[1rem] font-semibold
         p-6 mt-4">Sign in</button>

            <section>
                <div class="grid grid-cols-[1fr_auto_1fr] items-center text-center gap-1.5 my-4">
                    <hr class="text-[#E4E4E7]">
                    <span class="text-[#1F2937] text-[1rem]">OR</span>
                    <hr class="text-[#E4E4E7]">
                </div>

                <h6 class="text-[#64748B] text-[0.867rem] text-center mb-1.5">Demo Credentials:</h6>
                <div class="bg-[#F8FAFC] rounded-lg p-4 text-center">
                    <p class="text-[#1F2937] text-[1rem]"><span class="font-semibold">Username:</span> admin</p>
                    <p class="text-[#1F2937] text-[1rem]"><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </section>
        </form>
    </section>

    <!-- JavaScript -->
    <script src="./script/login.js"></script>
</body>

</html>
